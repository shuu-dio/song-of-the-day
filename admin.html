<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Song of the Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f9f9f7;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .card {
      background: white; border-radius: 20px; padding: 36px 32px;
      width: 100%; max-width: 420px;
      box-shadow: 0 2px 24px rgba(0,0,0,.07);
      border: .5px solid rgba(0,0,0,.06);
    }

    .card-title {
      font-size: 13px; letter-spacing: .1em; text-transform: uppercase;
      color: #bbb; margin-bottom: 28px; text-align: center;
    }

    label {
      display: block; font-size: 11px; color: #aaa;
      letter-spacing: .06em; text-transform: uppercase;
      margin-bottom: 6px; margin-top: 16px;
    }

    label:first-of-type { margin-top: 0; }

    input {
      width: 100%; display: block; background: #f5f5f3; border: none;
      border-radius: 10px; padding: 12px 14px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; color: #1a1a1a;
      outline: none; -webkit-appearance: none;
    }

    input[type="password"] { letter-spacing: .1em; }
    input::placeholder { color: #bbb; letter-spacing: 0; }

    .btn {
      margin-top: 20px; width: 100%; padding: 14px;
      background: #1a1a1a; color: white; border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; letter-spacing: .02em; transition: background .2s;
      -webkit-appearance: none;
    }
    .btn:active   { background: #333; }
    .btn:disabled { background: #ccc; cursor: default; }

    .status {
      margin-top: 14px; font-size: 13px;
      text-align: center; min-height: 20px; color: #bbb;
    }
    .status.ok  { color: #5a9a6a; }
    .status.err { color: #c05050; }

    #login-screen { display: block; }
    #admin-screen { display: none;  }

    .date-label {
      font-size: 13px; color: #999; text-align: center; margin-bottom: 24px;
    }

    .song-field {
      background: #f5f5f3; border-radius: 10px; padding: 14px;
      margin-bottom: 10px;
    }

    .song-title-display {
      font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px;
    }

    .song-meta-display {
      font-size: 12px; color: #aaa;
    }

    .current-label {
      font-size: 11px; color: #aaa; letter-spacing: .06em;
      text-transform: uppercase; margin-bottom: 6px; margin-top: 20px;
      display: block;
    }

    .current-box {
      background: #f5f5f3; border-radius: 10px; padding: 12px 14px;
      font-size: 12px; color: #888; line-height: 1.5; min-height: 40px;
    }

    .view-site {
      display: block; text-align: center; margin-top: 16px;
      font-size: 12px; color: #bbb; text-decoration: none; letter-spacing: .04em;
    }
    .view-site:hover { color: #888; }

    .paste-hint {
      font-size: 11px; color: #bbb; margin-top: 8px; line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="card" id="login-screen">
    <div class="card-title">Song of the Day · Admin</div>
    <label>Password</label>
    <input type="password" id="password-input" placeholder="Enter password" />
    <button class="btn" onclick="login()">Log in</button>
    <div class="status" id="login-status"></div>
  </div>

  <!-- Admin -->
  <div class="card" id="admin-screen">
    <div class="card-title">Song of the Day · Admin</div>
    <div class="date-label" id="date-label"></div>

    <label>Paste today's song URL</label>
    <input type="text" id="url-input" placeholder="https://shuu-dio.github.io/song-of-the-day/#..." />
    <div class="paste-hint">Generate this from your song page using the admin panel (A D M), then paste it here.</div>

    <span class="current-label">Currently saved song</span>
    <div class="current-box" id="current-box">Loading...</div>

    <button class="btn" id="save-btn" onclick="saveUrl()">Save today's link</button>
    <div class="status" id="save-status"></div>

    <a class="view-site" href="index.html" target="_blank">View song page →</a>
  </div>

  <script>
    const JSONBIN_KEY = '$2a$10$/qsO.ZZgxNj4oGi4ypCgkOxJh66012mqme3NtQS7ODKyv8djZAqE.';
    const PASSWORD    = 'Playasong@2026';
    const BIN_ID_KEY  = 'sotd_bin_id';

    let binId = localStorage.getItem(BIN_ID_KEY) || null;

    document.getElementById('password-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });

    function login() {
      const val = document.getElementById('password-input').value;
      if (val === PASSWORD) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-screen').style.display = 'block';
        initAdmin();
      } else {
        const s = document.getElementById('login-status');
        s.textContent = 'Incorrect password.';
        s.className   = 'status err';
      }
    }

    function initAdmin() {
      const now = new Date();
      document.getElementById('date-label').textContent =
        now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      loadCurrent();
    }

    async function loadCurrent() {
      const box = document.getElementById('current-box');
      if (!binId) { box.textContent = 'Nothing saved yet.'; return; }
      try {
        const res  = await fetch('https://api.jsonbin.io/v3/b/' + binId + '/latest', {
          headers: { 'X-Master-Key': JSONBIN_KEY }
        });
        const data = await res.json();
        const r    = data.record;
        if (r && r.title) {
          box.textContent = r.title + ' — ' + (r.artist || '') + (r.album ? ' · ' + r.album : '');
        } else {
          box.textContent = 'Nothing saved yet.';
        }
      } catch(e) {
        box.textContent = 'Could not load.';
      }
    }

    async function saveUrl() {
      const url    = document.getElementById('url-input').value.trim();
      const btn    = document.getElementById('save-btn');
      const status = document.getElementById('save-status');

      if (!url || !url.includes('#')) {
        status.textContent = 'Please paste a valid song URL (must include #).';
        status.className   = 'status err';
        return;
      }

      // Decode the hash to extract song data
      let songData = null;
      try {
        const hash = url.split('#')[1];
        songData   = JSON.parse(decodeURIComponent(escape(atob(hash))));
      } catch(e) {
        status.textContent = 'Could not read song data from URL. Make sure you copied the full link.';
        status.className   = 'status err';
        return;
      }

      // Strip the previewUrl — redirect.html will fetch a fresh one
      const toStore = {
        title:      songData.title      || '',
        artist:     songData.artist     || '',
        album:      songData.album      || '',
        duration:   songData.duration   || '',
        prompt:     songData.prompt     || '',
        spotifyUrl: songData.spotifyUrl || ''
      };

      btn.disabled    = true;
      btn.textContent = 'Saving...';
      status.textContent = '';
      status.className   = 'status';

      try {
        if (!binId) {
          const res  = await fetch('https://api.jsonbin.io/v3/b', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Master-Key': JSONBIN_KEY,
              'X-Bin-Name':   'sotd',
              'X-Private':    'true'
            },
            body: JSON.stringify(toStore)
          });
          const data = await res.json();
          binId = data.metadata.id;
          localStorage.setItem(BIN_ID_KEY, binId);
        } else {
          await fetch('https://api.jsonbin.io/v3/b/' + binId, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'X-Master-Key': JSONBIN_KEY
            },
            body: JSON.stringify(toStore)
          });
        }

        status.textContent = '✓ Saved! Today\'s link is live.';
        status.className   = 'status ok';
        document.getElementById('current-box').textContent =
          toStore.title + ' — ' + toStore.artist + (toStore.album ? ' · ' + toStore.album : '');
        document.getElementById('url-input').value = '';

      } catch(e) {
        status.textContent = 'Something went wrong. Please try again.';
        status.className   = 'status err';
      }

      btn.disabled    = false;
      btn.textContent = 'Save today\'s link';
    }
  </script>
</body>
</html>
