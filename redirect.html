<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Song of the Day</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f9f9f7;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, sans-serif;
    }
    .msg { text-align: center; color: #bbb; font-size: 14px; letter-spacing: .04em; }
    .dot { display: inline-block; animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40%            { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="msg">
    loading today's song
    <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>

  <script>
    const JSONBIN_KEY = '$2a$10$/qsO.ZZgxNj4oGi4ypCgkOxJh66012mqme3NtQS7ODKyv8djZAqE.';
    const BIN_ID_KEY  = 'sotd_bin_id';
    const BASE_URL    = 'https://shuu-dio.github.io/song-of-the-day/';

    // Encode data into base64 hash
    function encodeData(obj) {
      try { return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }
      catch(e) { return ''; }
    }

    // Fetch fresh Deezer preview via JSONP
    function getDeezerPreview(title, artist) {
      return new Promise((resolve) => {
        const cbName = '_dz_' + Date.now();
        const q      = encodeURIComponent(title + ' ' + artist);
        window[cbName] = function(data) {
          delete window[cbName];
          document.getElementById('dz')?.remove();
          resolve(data && data.data && data.data[0] && data.data[0].preview
            ? data.data[0].preview : null);
        };
        const s   = document.createElement('script');
        s.id      = 'dz';
        s.src     = 'https://api.deezer.com/search?q=' + q + '&limit=1&output=jsonp&callback=' + cbName;
        s.onerror = () => { delete window[cbName]; resolve(null); };
        document.head.appendChild(s);
        setTimeout(() => { if (window[cbName]) { delete window[cbName]; resolve(null); } }, 6000);
      });
    }

    async function load() {
      try {
        // Get bin ID — first try localStorage, then fetch from JSONBin by name
        let binId = localStorage.getItem(BIN_ID_KEY);

        if (!binId) {
          // Try to find the bin
          const listRes  = await fetch('https://api.jsonbin.io/v3/b?sortBy=createdAt&order=desc', {
            headers: { 'X-Master-Key': JSONBIN_KEY }
          });
          const listData = await listRes.json();
          if (listData && listData.length > 0) {
            binId = listData[0].record.id || listData[0].id;
            if (binId) localStorage.setItem(BIN_ID_KEY, binId);
          }
        }

        if (!binId) { fallback(); return; }

        // Fetch song data
        const res  = await fetch('https://api.jsonbin.io/v3/b/' + binId + '/latest', {
          headers: { 'X-Master-Key': JSONBIN_KEY }
        });
        const data = await res.json();
        const r    = data.record;

        if (!r || !r.title) { fallback(); return; }

        // Get a fresh Deezer preview
        const previewUrl = await getDeezerPreview(r.title, r.artist);

        // Build the hash with fresh preview
        const songData = {
          title:      r.title,
          artist:     r.artist      || '',
          album:      r.album       || '',
          duration:   r.duration    || '',
          prompt:     r.prompt      || '',
          spotifyUrl: r.spotifyUrl  || '',
          previewUrl: previewUrl    || null
        };

        const hash = encodeData(songData);
        window.location.replace(BASE_URL + '#' + hash);

      } catch(e) {
        fallback();
      }
    }

    function fallback() {
      window.location.replace(BASE_URL);
    }

    load();
  </script>
</body>
</html>
