<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Song of the Day</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f9f9f7;
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .msg {
      text-align: center;
      font-family: -apple-system, sans-serif;
      color: #bbb;
      font-size: 14px;
      letter-spacing: .04em;
    }
    .dot {
      display: inline-block;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40%            { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="msg">
    loading today's song
    <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>
  <script>
    const JSONBIN_KEY = '$2a$10$/qsO.ZZgxNj4oGi4ypCgkOxJh66012mqme3NtQS7ODKyv8djZAqE.';
    const BIN_ID_KEY  = 'sotd_bin_id';

    async function redirect() {
      try {
        const binId = localStorage.getItem(BIN_ID_KEY);
        if (!binId) {
          fallback();
          return;
        }
        const res  = await fetch('https://api.jsonbin.io/v3/b/' + binId + '/latest', {
          headers: { 'X-Access-Key': JSONBIN_KEY }
        });
        const data = await res.json();
        const url  = data.record && data.record.todayUrl;
        if (url) {
          window.location.replace(url);
        } else {
          fallback();
        }
      } catch(e) {
        fallback();
      }
    }

    function fallback() {
      window.location.replace('index.html');
    }

    redirect();
  </script>
</body>
</html>
